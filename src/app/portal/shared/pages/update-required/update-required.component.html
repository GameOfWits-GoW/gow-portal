<main class="flex min-h-screen items-center justify-center bg-slate-950 px-6 text-center text-white">
  <section class="max-w-lg">
    <h1 class="text-3xl font-bold">Update required</h1>
    <p class="mt-4 text-slate-300">
      This portal version is no longer supported. Refresh this page to download the latest version.
    </p>
    <button
      class="mt-6 rounded bg-white px-4 py-2 font-semibold text-slate-950"
      type="button"
      (click)="refresh()"
    >
      Refresh portal
    </button>
    <p class="mt-4 text-sm text-slate-400">
      If refreshing does not work, clear this site's browser data or open the portal in a new browser window, then try again.
    </p>
  </section>
</main>
